apiVersion: v1
kind: Namespace
metadata:
  name: sopra-hr

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-page
  namespace: sopra-hr
  labels:
    app: login-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: login-page
  template:
    metadata:
      labels:
        app: login-page
    spec:
      containers:
        - name: login-page
          image: europe-west9-docker.pkg.dev/maram-pfe/sopra-repo/login-page:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: login-page-service
  namespace: sopra-hr
spec:
  selector:
    app: login-page
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
